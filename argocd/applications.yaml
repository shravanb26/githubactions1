apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/shravanb26/githubactions1.git
    targetRevision: main
    path: manifest

  destination:
    server: https://kubernetes.default.svc
    namespace: testing

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
