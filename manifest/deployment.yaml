apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: 279112112893.dkr.ecr.us-east-1.amazonaws.com/actions:da9958b06de4394ba205b6d309e00fd038e55f59
        ports:
        - containerPort: 3000
